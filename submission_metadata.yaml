# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid Retrieval (FAISS + BM25) and Additive Scoring with Cross-Encoder reranking.
  We heavily pre-compute embeddings and structured features offline using `precompute.py`.
  During runtime (`rank.py`), we retrieve top 500 candidates using a union of semantic and keyword search. 
  These 500 candidates are rescored with a cross-encoder and an additive feature score. 
  Logic traps (honeypots, ghosts, consulting-only, title chasers, pure research) are captured as hard multipliers on the final score.

