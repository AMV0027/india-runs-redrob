# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/AMV0027/india-runs-redrob"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3.

sandbox_link: "https://huggingface.co/spaces/AMV0027/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample.

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Runs end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows PC" # Or: "AWS EC2 c5.4xlarge", etc.
  cpu_cores: 8 # Number of CPU cores used
  ram_gb: 16 # Available RAM in GB
  python_version: "3.11" # python --version
  os: "Windows 11" # Operating System
  uses_gpu_for_inference: false # Must be false — see compute constraints
  has_network_during_ranking: false # Must be false — no API calls during ranking
  pre_computation_required: false # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0 # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest.
ai_tools_used:
  - "Claude"
  - "Antigravity"

ai_usage_summary: |
  Used Claude for code optimization, architectural refactoring, and setting up
  the submission readiness wrapper and offline model loading pipeline.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  An end-to-end Candidate Discovery pipeline featuring dynamic honeypot/blacklist
  filters, followed by a hybrid ranking strategy blending BM25 lexical search with
  an ONNX-optimized CrossEncoder (MiniLM-L-6) model using Reciprocal Rank Fusion (RRF).
  Final rankings are fine-tuned via 11 behavioral platform signal multipliers.
  All model weights and tokenizers are packaged locally for offline CPU execution.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true # I have read submission_spec.md in full
  code_is_original_work: true # My code is my team's original work
  no_collusion: true # I have not coordinated my submission with other teams
  honeypot_check_done: true # Set true as we explicitly checked for honeypots
  reproduction_tested: true # I have tested that my reproduce_command runs end-to-end
