reproduce_command: "python rank.py --candidates ../challange_dataset/candidates.jsonl --out ./submission.csv --data_dir ."

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Development"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 10

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  
ai_usage_summary: |
  Used Gemini to orchestrate the entire development process, write the code, and evaluate the logic traps.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Hybrid Retrieval (FAISS + BM25) and Additive Scoring with Cross-Encoder reranking.
  We heavily pre-compute embeddings and structured features offline using `precompute.py`.
  During runtime (`rank.py`), we retrieve top 500 candidates using a union of semantic and keyword search. 
  These 500 candidates are rescored with a cross-encoder and an additive feature score. 
  Logic traps (honeypots, ghosts, consulting-only, title chasers, pure research) are captured as hard multipliers on the final score.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
